<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Facturacion e Inventario</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <header class="topbar">
    <button class="icon-button mobile-only" id="menuToggle" type="button" aria-label="Abrir menu">☰</button>
    <div>
      <h1 id="companyTitle">Sistema de Facturacion</h1>
      <span class="topbar-subtitle">Facturacion, ventas e inventario</span>
    </div>
    <div class="header-actions">
      <button class="secondary" id="seedDataBtn" type="button">Datos demo</button>
      <button class="secondary" id="exportJsonBtn" type="button">JSON</button>
      <button class="secondary" id="exportExcelBtn" type="button">Excel</button>
      <button class="secondary" id="exportPdfBtn" type="button">PDF</button>
      <button class="danger" id="resetBtn" type="button">Reiniciar</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav aria-label="Modulos del sistema" id="mainNav"></nav>
    </aside>
    <main class="content">
      <div id="appMessage" aria-live="polite"></div>
      <section id="viewRoot" class="view-shell"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
